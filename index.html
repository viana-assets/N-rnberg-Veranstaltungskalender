<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viana · Nürnberg 2026</title>
<meta name="description" content="Viana – dein Event- und Locationguide für die Metropolregion Nürnberg 2026">
<meta name="theme-color" content="#0e0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="assets/icon-96x96.png">
<link rel="apple-touch-icon" href="assets/icon-128x128.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg, #0e0f13);
  color: var(--text, #f1f2f4);
  font-family: 'DM Sans', sans-serif;
  padding: 2rem 1.5rem;
  position: relative;
  overflow-x: hidden;
}

/* Subtle background glow */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(232,150,58,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.landing-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2.5rem;
}

/* ── HEADER ── */
.landing-header {
  text-align: center;
}
.landing-wordmark {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.8rem, 10vw, 4.5rem);
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text, #f1f2f4);
  line-height: 1;
  margin-bottom: 0.6rem;
}
.landing-wordmark span {
  color: #e8963a;
}
.landing-tagline {
  font-size: 14px;
  color: var(--muted, #6b7280);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.landing-region {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 0.9rem;
  padding: 5px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  font-size: 12px;
  color: var(--muted, #6b7280);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 500;
}
.landing-region::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #e8963a;
  flex-shrink: 0;
}

/* ── TILES ── */
.landing-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
}

.landing-tile {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  padding: 1.6rem 1.4rem;
  background: var(--surface, #16181f);
  border: 1px solid var(--border, rgba(255,255,255,0.07));
  border-radius: 20px;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: all 0.22s ease;
  position: relative;
  overflow: hidden;
  min-height: 160px;
}
.landing-tile::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--tile-accent, #e8963a);
  opacity: 0.5;
  transition: opacity 0.22s ease;
}
.landing-tile:hover {
  background: var(--surface2, #1e2029);
  border-color: rgba(255,255,255,0.13);
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.4);
}
.landing-tile:hover::before { opacity: 1; }

.tile-events { --tile-accent: #e8963a; }
.tile-places { --tile-accent: #5b8ff9; }

.tile-emoji {
  font-size: 2rem;
  line-height: 1;
}
.tile-label {
  font-family: 'Syne', sans-serif;
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--text, #f1f2f4);
  line-height: 1;
}
.tile-desc {
  font-size: 12px;
  color: var(--muted, #6b7280);
  line-height: 1.5;
  flex: 1;
}
.tile-arrow {
  margin-top: auto;
  font-size: 18px;
  color: var(--tile-accent, #e8963a);
  opacity: 0.7;
  transition: opacity 0.2s, transform 0.2s;
}
.landing-tile:hover .tile-arrow {
  opacity: 1;
  transform: translateX(4px);
}

/* ── FOOTER ── */
.landing-footer {
  font-size: 11px;
  color: var(--muted, #6b7280);
  text-align: center;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.landing-footer a {
  color: var(--muted, #6b7280);
  text-decoration: none;
  transition: color 0.15s;
}
.landing-footer a:hover { color: #e8963a; }

/* ── MOBILE ── */
@media (max-width: 400px) {
  .landing-tiles { grid-template-columns: 1fr; }
  .landing-tile { min-height: 130px; }
}
</style>
</head>
<body>

<div class="landing-wrap">

  <div class="landing-header">
    <div class="landing-wordmark">Vi<span>ana</span></div>
    <div class="landing-tagline">Dein Guide für Nürnberg & Umgebung</div>
    <div class="landing-region">Metropolregion Nürnberg · 2026</div>
  </div>

  <div class="landing-tiles">
    <a href="events.html" class="landing-tile tile-events">
      <div class="tile-emoji">🎉</div>
      <div class="tile-label">Events</div>
      <div class="tile-desc">Festivals, Partys, Kärwas & mehr</div>
      <div class="tile-arrow">→</div>
    </a>
    <a href="places.html" class="landing-tile tile-places">
      <div class="tile-emoji">📍</div>
      <div class="tile-label">Places</div>
      <div class="tile-desc">Locations, Clubs & Ausflugsziele</div>
      <div class="tile-arrow">→</div>
    </a>
  </div>

  <div class="landing-footer">
    <span>Ein Projekt von <strong style="color:var(--text)">Viana</strong></span>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
    <a href="agb.html">AGB</a>
  </div>

</div>

<script src="js/cookie-banner.js"></script>
</body>
</html>
